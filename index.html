<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PrettyMe</title>
  <meta name="theme-color" content="#0f1021" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-content">
      <div class="brand">
        <img src="icon.svg" alt="" class="brand-icon" />
        <span class="brand-name">PrettyMe</span>
      </div>
      <div class="progress-dots">
        <span class="dot" data-dot="1"></span>
        <span class="dot" data-dot="2"></span>
        <span class="dot" data-dot="3"></span>
      </div>
    </div>
  </header>

  <main class="wizard">
    <!-- Step 1: Selfie -->
    <section class="step" data-step="1">
      <div class="step-content">
        <div class="step-header">
          <h2 class="step-title">Sube un selfie</h2>
          <p class="step-subtitle">Hazte una foto o sube una desde tu galería</p>
        </div>

        <div class="camera-area">
          <div id="cameraWrap" class="camera-wrap hidden">
            <video id="camera" autoplay playsinline muted class="hidden"></video>
            <img id="capturedImage" class="hidden" alt="Selfie capturado" />
            <div id="cameraOverlay" class="camera-overlay hidden">Encuadra bien tu cara y deja algo de hombros</div>
          </div>

          <div id="cropEditor" class="crop-editor hidden">
            <div id="cropViewport" class="crop-viewport">
              <img id="cropImage" alt="Reencuadre" />
              <div class="crop-frame"></div>
            </div>
            <div class="crop-toolbar">
              <div class="crop-zoom-group">
                <label class="crop-zoom-label" for="cropZoom">Zoom</label>
                <input id="cropZoom" type="range" min="1" max="3" step="0.01" value="1" />
              </div>
              <button id="rotateCropBtn" class="btn-ghost" type="button">Rotar 90°</button>
            </div>
            <div class="crop-actions">
              <button id="cancelCropBtn" class="btn-ghost">Cancelar</button>
              <button id="applyCropBtn" class="btn-primary">Usar recorte</button>
            </div>
          </div>

          <div id="cameraPlaceholder" class="camera-placeholder">
            <span class="placeholder-icon">📸</span>
            <span class="placeholder-text">Tu selfie aparecerá aquí</span>
          </div>
        </div>

        <input id="galleryInput" class="hidden" type="file" accept="image/*" />

        <div class="camera-controls">
          <button id="startCameraBtn" class="btn-primary">Abrir cámara</button>
          <button id="captureBtn" class="btn-primary hidden">Hacer selfie</button>
          <button id="switchCameraBtn" class="btn-ghost hidden">Cambiar cámara</button>
          <button id="uploadBtn" class="btn-ghost">Subir desde galería</button>
          <button id="retakeBtn" class="btn-ghost hidden">Repetir</button>
        </div>
      </div>

      <div class="step-footer">
        <p id="statusText" class="status-text">Abre la cámara o sube una foto para empezar</p>
        <button id="nextStep1Btn" class="btn-primary btn-next" disabled>Siguiente</button>
      </div>
    </section>

    <!-- Step 2: Configurar -->
    <section class="step" data-step="2">
      <div class="step-content">
        <div class="step-header">
          <h2 class="step-title">Elige el resultado</h2>
          <p class="step-subtitle">Selecciona estilos y ajusta las opciones</p>
        </div>

        <div class="field">
          <label class="field-label">Estilos</label>
          <div class="style-grid" id="styleGrid"></div>
        </div>

        <div class="field">
          <label class="field-label">Número de imágenes</label>
          <div class="segmented-control" id="resultCount">
            <button class="segment active" data-count="2">2</button>
            <button class="segment" data-count="4">4</button>
          </div>
        </div>

        <div class="field">
          <label class="field-label">Tipo de foto</label>
          <div class="segmented-control" id="photoType">
            <button class="segment active" data-photo-type="full">Cuerpo entero</button>
            <button class="segment" data-photo-type="portrait">Primer plano</button>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="extraPrompt">Detalles extra</label>
          <textarea id="extraPrompt" placeholder="Ej: luz dorada, estilo editorial, mirada confiada..."></textarea>
        </div>
      </div>

      <div class="step-footer">
        <button id="backStep2Btn" class="btn-ghost">Atrás</button>
        <button id="generateBtn" class="btn-primary btn-next">Generar fotos</button>
      </div>
    </section>

    <!-- Step 3: Resultados -->
    <section class="step" data-step="3">
      <div class="step-content">
        <div class="step-header">
          <h2 class="step-title">Tus fotos</h2>
          <p class="step-subtitle">Descarga las que más te gusten</p>
        </div>

        <div id="resultsGrid" class="results-grid"></div>
      </div>

      <div class="step-footer">
        <button id="backStep3Btn" class="btn-ghost">Atrás</button>
        <button id="regenerateBtn" class="btn-primary btn-next">Generar más</button>
      </div>
    </section>
  </main>

  <canvas id="captureCanvas" class="hidden"></canvas>
  <script type="module" src="app.js"></script>
</body>
</html>
